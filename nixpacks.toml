[phases.setup]
nixPkgs = [
  "python312",
  "gcc",
  "postgresql_15",
  "pango",
  "cairo",
  "gdk-pixbuf",
  "gobject-introspection",
  "libffi",
  "glib",
  "fontconfig",
  "freetype",
]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --noinput"]
